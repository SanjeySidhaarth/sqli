{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<link rel="preconnect" href="https://fonts.gstatic.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css" rel="stylesheet">

<link rel="stylesheet" type="text/css" href="{% static 'css/upload.css' %}">

<title>Cyber Security Chatbot</title>

<style>

.chat-box{
height:420px;
overflow-y:auto;
background:white;
border-radius:10px;
padding:15px;
border:1px solid #ddd;
display:flex;
flex-direction:column;
gap:10px;
}

.chat-message{
display:flex;
align-items:flex-end;
gap:10px;
max-width:85%;
}

.chat-message.user{
flex-direction:row-reverse;
align-self:flex-end;
}

.chat-message.bot{
align-self:flex-start;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
background:#007bff;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

.chat-message.bot .avatar{
background:#6c757d;
}

.message{
background:#f1f1f1;
padding:10px 14px;
border-radius:15px;
font-size:14px;
}

.chat-message.user .message{
background:#007bff;
color:white;
}

.time{
font-size:10px;
margin-top:3px;
opacity:0.6;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<a class="navbar-brand" href="{% url 'index' %}">
<img width="150px" src="{% static 'assets/logoWhite.png' %}">
</a>

<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">

<span class="navbar-toggler-icon"><i class="fas fa-bars"></i></span>

</button>

<div class="collapse navbar-collapse justify-content-end" id="navbarNav">

<ul class="navbar-nav">

<li class="nav-item">
<a class="nav-link" href="{% url 'predict' %}">
<i class="fa fa-search"></i> Detection
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'history' %}">
<i class="fa fa-history"></i> History
</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="{% url 'chatbot' %}">
<i class="fa fa-comments"></i> Chatbot
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="{% url 'logout' %}">
<i class="fa fa-sign-out"></i> Logout
</a>
</li>

</ul>

</div>

</nav>


<!-- CHATBOT CONTAINER -->

<div class="container mt-5">

<div class="row">

<div class="col-md-5 mx-auto">

<div class="text-center mb-3">

<h3><i class="fa fa-robot"></i> Security AI Assistant</h3>

</div>


<div class="wrapper">

<div class="upload-container">

<div class="border-container text-center">


<p>Ask anything about</p>

<div class="icons fa-4x mb-3">

<i class="fas fa-shield-alt m-2"></i>

<p class="icon-text inline-flex">SQL Injection / Web Security</p>

</div>


<!-- CHAT AREA -->

<div id="chatBox" class="chat-box">

    <div class="chat-message bot">
    
    <div class="avatar">
    <i class="fa fa-robot"></i>
    </div>
    
    <div class="message">
    Hello 👋 I'm your SQL Injection Security Assistant.  
    Ask me anything about cybersecurity.
    <div class="time">Now</div>
    </div>
    
    </div>
    
    </div>


<!-- INPUT -->

<div class="input-group">

<input id="userInput" class="form-control chat-input" placeholder="Ask about SQL injection...">

<button class="btn btn-primary" onclick="sendMessage()">

<i class="fa fa-paper-plane"></i>

</button>

</div>

</div>

</div>

</div>

</div>

</div>

</div>


<!-- Footer -->

<footer class="mt-5 text-center">

<p class="text-muted">© 2025 | Cyber Security Assistant</p>

</footer>


<script>

function sendMessage(){

let input=document.getElementById("userInput");
let message=input.value.trim();

if(message==="") return;

let chat=document.getElementById("chatBox");

let time=new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

chat.innerHTML+=`
<div class="chat-message user">
<div class="avatar"><i class="fa fa-user"></i></div>
<div class="message">${message}<div class="time">${time}</div></div>
</div>
`;

input.value="";

chat.scrollTop=chat.scrollHeight;


// loading bubble
chat.innerHTML+=`
<div class="chat-message bot" id="loadingMsg">
<div class="avatar"><i class="fa fa-robot"></i></div>
<div class="message">Typing...</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;


fetch("/chatbot-api/",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"message="+encodeURIComponent(message)
})

.then(res=>res.json())

.then(data=>{

document.getElementById("loadingMsg").remove();

chat.innerHTML+=`
<div class="chat-message bot">
<div class="avatar"><i class="fa fa-robot"></i></div>
<div class="message">${data.response}<div class="time">${time}</div></div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

});

}


// ENTER key send
document.getElementById("userInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});
</script>


<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/js/all.min.js"></script>

</body>
</html>
